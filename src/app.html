<!doctype html>
<html lang="vi">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Live Gold Prices Vietnam | SJC & Mi Hong Price Tracker</title>
	<meta name="description"
		content="Track live gold prices in Vietnam from SJC and Mi Hong. Real-time updates, historical charts, and price comparison for SJC 9999 and gold rings." />

	<!-- Open Graph / Facebook / YouTube / TikTok -->
	<meta property="og:type" content="website" />
	<meta property="og:url" content="https://anhle.gold-prices-bot.workers.dev/" />
	<meta property="og:site_name" content="Gold Prices Vietnam Bot" />
	<meta property="og:title" content="Live Gold Prices Vietnam | SJC & Mi Hong Price Tracker" />
	<meta property="og:description"
		content="Real-time gold price tracking for SJC and Mi Hong. Stay updated with the latest market trends in Vietnam." />
	<meta property="og:image" content="https://anhle.gold-prices-bot.workers.dev/og-image.png" />
	<meta property="og:image:alt" content="Live Gold Prices Vietnam Tracker - SJC and Mi Hong" />
	<meta property="og:image:width" content="1200" />
	<meta property="og:image:height" content="630" />
	<meta property="og:locale" content="vi_VN" />

	<!-- Zalo specific -->
	<meta property="zalo:title" content="Live Gold Prices Vietnam | SJC & Mi Hong Price Tracker" />
	<meta property="zalo:description"
		content="Theo dõi giá vàng trực tuyến tại Việt Nam từ SJC và Mi Hồng. Cập nhật thời gian thực, biểu đồ lịch sử và so sánh giá vàng SJC 9999, vàng nhẫn." />
	<meta property="zalo:image" content="https://anhle.gold-prices-bot.workers.dev/og-image.png" />

	<!-- Twitter -->
	<meta property="twitter:card" content="summary_large_image" />
	<meta property="twitter:title" content="Live Gold Prices Vietnam | SJC & Mi Hong Price Tracker" />
	<meta property="twitter:description"
		content="Real-time gold price tracking for SJC and Mi Hong. Stay updated with the latest market trends in Vietnam." />
	<meta property="twitter:image" content="https://anhle.gold-prices-bot.workers.dev/og-image.png" />

	<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"
		media="print" onload="this.media='all'" />
	<script>
		(function () {
			const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
			if (theme === 'light') document.documentElement.classList.add('light-mode');
			const lang = localStorage.getItem('lang') || 'vi';
			document.documentElement.setAttribute('lang', lang);
		})();
	</script>
	<link rel="canonical" href="https://anhle.gold-prices-bot.workers.dev/" />
	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
